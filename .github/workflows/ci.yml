name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `astro build` generates Cloudflare env types and compiles the app.
      # It does NOT run full strict TypeScript checking; `astro check` does.
      # The codebase currently has pre-existing strict-mode diagnostics
      # (see scripts/* and a handful of optional-chain sites in src/).
      # Once those are cleaned up, add a `- run: npx astro check` step
      # above this one to turn strict type errors into CI failures.
      - name: Build
        run: npm run build
